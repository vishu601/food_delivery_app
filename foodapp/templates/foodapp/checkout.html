<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Zwigato</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans">

    <nav class="bg-white shadow-sm h-16 flex items-center">
        <div class="max-w-7xl mx-auto px-4 w-full flex justify-between items-center">
            <a href="{% url 'home' %}" class="text-2xl font-black text-orange-500">Zwigato</a>
            <a href="{% url 'cart_detail' %}" class="text-gray-600 font-semibold hover:text-orange-500">← Back to Cart</a>
        </div>
    </nav>

    <main class="max-w-xl mx-auto px-4 py-12">
        <div class="bg-white rounded-3xl shadow-sm p-8 border border-gray-100">
            <h2 class="text-3xl font-extrabold mb-2 text-gray-800">Delivery Details</h2>
            <p class="text-sm text-gray-500 mb-8">Please enter your address where you want the food delivered.</p>

            <form method="POST" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Full Name</label>
                    <input type="text" name="name" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-orange-500 text-gray-800">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Phone Number</label>
                    <input type="text" name="phone" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-orange-500 text-gray-800" placeholder="e.g. 98765xxxxx">
                </div>

                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Complete Address</label>
                    <textarea name="address" rows="3" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-orange-500 text-gray-800" placeholder="House No, Building, Street Name, Area..."></button></textarea>
                </div>

                <div class="bg-orange-50 rounded-2xl p-4 border border-orange-100 flex justify-between items-center my-6">
                    <span class="font-bold text-gray-700">Amount to Pay (COD):</span>
                    <span class="text-2xl font-black text-orange-600">₹{{ total_amount }}</span>
                </div>

                <button type="submit" class="w-full bg-orange-500 text-white font-bold py-4 px-4 rounded-2xl hover:bg-orange-600 transition shadow-lg shadow-orange-100 active:scale-95">
                    Place Order (Cash on Delivery)
                </button>
            </form>
        </div>
    </main>

</body>
</html>
