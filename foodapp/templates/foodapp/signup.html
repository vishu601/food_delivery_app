<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Zwigato</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 h-screen flex flex-col justify-center items-center font-sans px-4">

    <div class="bg-white rounded-3xl shadow-sm p-8 border border-gray-100 w-full max-w-md my-8 overflow-y-auto max-h-[90vh]">
        <div class="text-center mb-6">
            <h1 class="text-3xl font-black text-orange-500 mb-2">Zwigato</h1>
            <h2 class="text-xl font-bold text-gray-800">Create Account</h2>
            <p class="text-sm text-gray-400 mt-1">Join us for fast and tasty food delivery</p>
        </div>

        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div class="space-y-2 text-sm font-semibold text-gray-600">
                {% for field in form %}
                    <div class="flex flex-col gap-1">
                        <label>{{ field.label }}</label>
                        {{ field }}
                    </div>
                {% endfor %}
            </div>

            <button type="submit" class="w-full bg-orange-500 text-white font-bold py-3 rounded-2xl hover:bg-orange-600 transition shadow-lg shadow-orange-100 active:scale-95 mt-4">
                Sign Up
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-6">
            Already have an account? <a href="{% url 'login' %}" class="text-orange-500 font-bold hover:underline">Login</a>
        </p>
    </div>

    <style>
        input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #E5E7EB;
            outline: none;
            color: #1F2937;
            font-weight: normal;
        }
        input:focus {
            border-color: #F97316;
        }
        .helptext, .errorlist {
            font-size: 11px;
            color: #9CA3AF;
            font-weight: normal;
            margin-top: 2px;
        }
    </style>
</body>
</html>
