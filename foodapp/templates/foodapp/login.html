<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Zwigato</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 h-screen flex justify-center items-center font-sans px-4">

    <div class="bg-white rounded-[2.5rem] shadow-xl p-10 border border-gray-100 w-full max-w-md transition-all duration-300 transform hover:scale-[1.01]">
        
        <div class="text-center mb-8">
            <span class="text-xs font-black uppercase tracking-[0.2em] text-orange-500 bg-orange-50 px-4 py-1.5 rounded-full">Premium Delivery</span>
            <h1 class="text-4xl font-black text-gray-900 mt-4 tracking-tight">Zwigato</h1>
            <p class="text-sm text-gray-400 mt-2">Welcome back! Please enter your details.</p>
        </div>

        <form method="POST" class="space-y-5">
            {% csrf_token %}
            
            <div class="space-y-1.5">
                <label class="text-xs font-bold uppercase tracking-wider text-gray-500 pl-1">Username</label>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-gray-400 text-lg">👤</span>
                    <input type="text" name="username" required 
                           class="w-full pl-12 pr-4 py-3.5 bg-gray-50 text-gray-800 rounded-2xl border border-gray-200 outline-none focus:border-orange-500 focus:bg-white focus:ring-4 focus:ring-orange-100 transition-all duration-200 font-medium" 
                           placeholder="Enter your username">
                </div>
            </div>

            <div class="space-y-1.5">
                <div class="flex justify-between items-center px-1">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-500">Password</label>
                    <a href="#" class="text-xs font-bold text-orange-500 hover:underline">Forgot?</a>
                </div>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-gray-400 text-lg">🔒</span>
                    <input type="password" name="password" required 
                           class="w-full pl-12 pr-4 py-3.5 bg-gray-50 text-gray-800 rounded-2xl border border-gray-200 outline-none focus:border-orange-500 focus:bg-white focus:ring-4 focus:ring-orange-100 transition-all duration-200 font-medium" 
                           placeholder="••••••••">
                </div>
            </div>

            {% if form.errors %}
                <p class="text-xs font-semibold text-red-500 text-center bg-red-50 py-2 rounded-xl">❌ Invalid username or password.</p>
            {% endif %}

            <div class="flex items-center justify-between px-1 py-1">
                <label class="flex items-center gap-2 text-sm text-gray-600 cursor-pointer select-none">
                    <input type="checkbox" class="w-4 h-4 rounded text-orange-500 focus:ring-orange-500 border-gray-300 accent-orange-500">
                    Keep me logged in
                </label>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold py-4 rounded-2xl hover:opacity-95 transition-all duration-200 shadow-lg shadow-orange-100 active:scale-[0.98] text-base tracking-wide mt-2">
                Sign In to Account
            </button>
        </form>

        <p class="text-center text-sm text-gray-500 mt-8">
            New to Zwigato? <a href="{% url 'signup' %}" class="text-orange-500 font-extrabold hover:underline">Create an account</a>
        </p>
    </div>

</body>
</html>
