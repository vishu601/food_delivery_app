<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Zwigato</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 h-screen flex justify-center items-center font-sans px-4">

    <div class="bg-white rounded-[2.5rem] shadow-xl p-10 border border-gray-100 w-full max-w-md">
        <div class="text-center mb-8">
            <span class="text-xs font-black uppercase tracking-[0.2em] text-orange-500 bg-orange-50 px-4 py-1.5 rounded-full">OTP Authentication</span>
            <h1 class="text-4xl font-black text-gray-900 mt-4 tracking-tight">Zwigato</h1>
            <p class="text-sm text-gray-400 mt-2">Enter your mobile number to login or signup instantly.</p>
        </div>

        <form method="POST" action="{% url 'login' %}" class="space-y-6">
            {% if backend_error %}
    <p class="text-xs font-semibold text-red-500 text-center bg-red-50 py-3 rounded-xl mb-4 border border-red-200">
        ❌ {{ backend_error }}
    </p>
{% endif %}
            {% csrf_token %}
            <div class="space-y-1.5">
                <label class="text-xs font-bold uppercase tracking-wider text-gray-500 pl-1">Mobile Number</label>
                <div class="relative flex items-center">
                    <span class="absolute left-4 text-gray-500 font-bold text-sm">+91</span>
                    <input type="text" name="phone" required maxlength="10" minlength="10"
                           class="w-full pl-14 pr-4 py-4 bg-gray-50 text-gray-800 rounded-2xl border border-gray-200 outline-none focus:border-orange-500 focus:bg-white focus:ring-4 focus:ring-orange-100 transition-all font-bold tracking-widest text-lg" 
                           placeholder="98765XXXXX">
                </div>
            </div>

            <button type="submit" class="w-full bg-gradient-to-r from-orange-500 to-amber-500 text-white font-bold py-4 rounded-2xl hover:opacity-95 transition shadow-lg shadow-orange-100 active:scale-[0.98] text-base tracking-wide">
                Send OTP
            </button>
        </form>
    </div>

</body>
</html>
