<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | Zwigato</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 h-screen flex justify-center items-center font-sans px-4">

    <div class="bg-white rounded-[2.5rem] shadow-xl p-10 border border-gray-100 w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black text-gray-900 tracking-tight">Enter OTP</h1>
            <p class="text-sm text-gray-400 mt-2">We have sent a 4-digit verification code to <span class="font-bold text-gray-700">+91 {{ phone }}</span></p>
        </div>

        <form method="POST" class="space-y-6">
            {% csrf_token %}
            <div class="space-y-1.5">
                <div class="flex justify-center">
                    <input type="text" name="otp" required maxlength="4" minlength="4"
                           class="w-40 text-center py-3 bg-gray-50 text-gray-800 rounded-2xl border border-gray-300 outline-none focus:border-orange-500 focus:bg-white focus:ring-4 focus:ring-orange-100 transition-all font-black tracking-[0.5em] text-2xl" 
                           placeholder="••••">
                </div>
            </div>

            {% if error %}
                <p class="text-xs font-semibold text-red-500 text-center bg-red-50 py-2 rounded-xl">❌ {{ error }}</p>
            {% endif %}

            <button type="submit" class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-bold py-4 rounded-2xl hover:opacity-95 transition shadow-lg shadow-emerald-100 active:scale-[0.98] text-base tracking-wide">
                Verify & Proceed
            </button>
        </form>
        
        <p class="text-center text-xs text-gray-400 mt-6">Hint: Check your VS Code terminal log for the OTP code!</p>
    </div>

</body>
</html>
