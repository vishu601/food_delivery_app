<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Placed Successfully! | Zwigato</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900 font-sans h-screen flex flex-col justify-between">

    <nav class="bg-white shadow-sm h-16 flex items-center">
        <div class="max-w-7xl mx-auto px-4 w-full">
            <a href="{% url 'home' %}" class="text-2xl font-black text-orange-500">Zwigato</a>
        </div>
    </nav>

    <main class="max-w-md mx-auto px-4 text-center py-12 flex-grow flex flex-col justify-center items-center">
        <div class="bg-white rounded-3xl shadow-sm p-8 border border-gray-100 w-full">
            <p class="text-6xl mb-4">🎉 ordered!</p>
            <h2 class="text-3xl font-black text-emerald-600 mb-2">Order Confirmed!</h2>
            <p class="text-gray-600 font-medium mb-6">Thank you, {{ order.customer_name }}!</p>
            
            <div class="bg-gray-50 rounded-2xl p-4 border border-gray-100 text-left space-y-2 mb-8 text-sm">
                <p class="text-gray-700"><span class="font-bold">Order ID:</span> #{{ order.id }}</p>
                <p class="text-gray-700"><span class="font-bold">Total Amount:</span> ₹{{ order.total_amount }} (COD)</p>
                <p class="text-gray-700"><span class="font-bold">Delivery to:</span> {{ order.address }}</p>
            </div>

            <a href="{% url 'home' %}" class="block w-full bg-orange-500 text-white font-bold py-4 rounded-2xl hover:bg-orange-600 transition shadow-lg shadow-orange-100">
                Order More Food
            </a>
        </div>
    </main>

    <footer class="text-center py-4 text-xs text-gray-400">
        © 2026 Zwigato. Superfast Delivery.
    </footer>

</body>
</html>
